<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Menlo', 'Consolas', monospace">
  <style>
    .term { fill: #00ff41; font-size: 13px; }
    .prompt { fill: #39ff14; font-size: 13px; font-weight: bold; }
    .cmd { fill: #ffffff; font-size: 13px; }
    .title { fill: #8b949e; font-size: 11px; }
    @keyframes blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: blink 1s steps(1) infinite; }
  </style>

  <!-- window background -->
  <rect width="480" height="360" rx="8" ry="8" fill="#0D1117" stroke="#21262d" stroke-width="1"/>

  <!-- title bar -->
  <rect width="480" height="26" rx="8" ry="8" fill="#161b22"/>
  <rect y="13" width="480" height="13" fill="#161b22"/>

  <!-- traffic lights -->
  <circle cx="16" cy="13" r="5.5" fill="#ff5f56"/>
  <circle cx="34" cy="13" r="5.5" fill="#ffbd2e"/>
  <circle cx="52" cy="13" r="5.5" fill="#27c93f"/>

  <!-- title -->
  <text x="240" y="17" text-anchor="middle" class="title">rab8it@arch: ~</text>

  <!-- terminal output -->
  <g transform="translate(14, 50)">
    <text x="0" y="0"   xml:space="preserve" class="prompt">┌─[rab8it@arch]─[~]</text>
    <text x="0" y="20"  xml:space="preserve" class="prompt">└──╼ $ <tspan class="cmd">cat .profile</tspan></text>

    <text x="0" y="56"  xml:space="preserve" class="term">  ╭──────────────────────────────────────────╮</text>
    <text x="0" y="76"  xml:space="preserve" class="term">  │   alias me='whoami'                      │</text>
    <text x="0" y="96"  xml:space="preserve" class="term">  │                                          │</text>
    <text x="0" y="116" xml:space="preserve" class="term">  │   ROLE     : Web Developer               │</text>
    <text x="0" y="136" xml:space="preserve" class="term">  │   STACK    : .NET · Perl · Python · JS   │</text>
    <text x="0" y="156" xml:space="preserve" class="term">  │   FOCUS    : Cybersecurity               │</text>
    <text x="0" y="176" xml:space="preserve" class="term">  │   LOCATION : Bulgaria                    │</text>
    <text x="0" y="196" xml:space="preserve" class="term">  │   OS       : Arch Linux (btw)            │</text>
    <text x="0" y="216" xml:space="preserve" class="term">  ╰──────────────────────────────────────────╯</text>

    <text x="0" y="252" xml:space="preserve" class="prompt">┌─[rab8it@arch]─[~]</text>
    <text x="0" y="272" xml:space="preserve" class="prompt">└──╼ $ <tspan class="cursor">▊</tspan></text>
  </g>
</svg>
